version: '3.8'

services:

  # ── Mock Services ──────────────────────────────────────────

  mock-jira:
    build: ./mock-services/jira
    container_name: mock-jira
    ports:
      - "8001:8001"
    networks:
      - mcp-network
    restart: unless-stopped

  mock-github:
    build: ./mock-services/github
    container_name: mock-github
    ports:
      - "8002:8002"
    networks:
      - mcp-network
    restart: unless-stopped

  mock-slack:
    build: ./mock-services/slack
    container_name: mock-slack
    ports:
      - "8003:8003"
    networks:
      - mcp-network
    restart: unless-stopped

  mock-sheets:
    build: ./mock-services/sheets
    container_name: mock-sheets
    ports:
      - "8004:8004"
    networks:
      - mcp-network
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    ports:
      - "6379:6379"
    networks:
      - mcp-network
    restart: unless-stopped

  # ── Backend ────────────────────────────────────────────────

  backend:
    build: ./backend
    container_name: mcp-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
    env_file:
      - ./.env
    depends_on:
      - redis
    networks:
      - mcp-network
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: mcp-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - mcp-network
    restart: unless-stopped

# ── Shared Network ─────────────────────────────────────────
networks:
  mcp-network:
    driver: bridge